services:
  # Unified Web Service (Backend + Static Frontend)
  - type: web
    name: qwikaid-all-in-one
    env: python
    buildCommand: ./build.sh
    startCommand: cd EmergencyAgentic && gunicorn --worker-class eventlet -w 1 app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///qwikaid.db
      - key: FRONTEND_URL
        value: https://qwikaid-1.onrender.com
      - key: VITE_API_URL
        value: https://qwikaid-1.onrender.com
